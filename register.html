<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IARA - Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
    
  <div class="auth-container">
    <div class="auth-card">
      <h1>IARA</h1>
      <p class="subtitle">Crie sua conta para acessar o sistema.</p>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Nome Completo</label>
          <input type="text" id="name" placeholder="Seu nome" required />
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar Senha</label>
          <input type="password" id="confirm-password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="auth-btn">Cadastrar</button>
      </form>

      <p class="switch-link">Já tem uma conta? <a href="login.html">Fazer login</a></p>
    </div>
  </div>

  <div id="custom-alert" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <h3 class="modal-title" id="alert-title">Aviso</h3>
      <p class="modal-text" id="alert-message"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm-btn" id="alert-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="register.js" defer></script>
</body>
</html>
