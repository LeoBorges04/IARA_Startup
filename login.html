<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IARA - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
    
  <div class="auth-container">
    <div class="auth-card">
      <img src="assets/logoChat.png" class="auth-logo" alt="IARA Logo">
      <h1>IARA</h1>
      <p class="subtitle">Inteligência Artificial de Raciocínio Algorítmico</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="auth-btn">Entrar</button>
      </form>

      <p class="switch-link">Ainda não tem conta? <a href="register.html">Criar conta</a></p>
    </div>
  </div>

  <div id="custom-alert" class="modal-overlay" style="display: none;">
    <div class="modal-container">
      <h3 class="modal-title" id="alert-title">Aviso</h3>
      <p class="modal-text" id="alert-message"></p>
      <div class="modal-actions">
        <button class="modal-btn confirm-btn" id="alert-ok-btn">OK</button>
      </div>
    </div>
  </div>

  <script src="login.js" defer></script>
</body>
</html>
